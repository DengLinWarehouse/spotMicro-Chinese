robot:
  hip_link_length: 0.055
  upper_leg_link_length: 0.1075
  lower_leg_link_length: 0.130
  body_width: 0.078
  body_length: 0.186

stance:
  default_stand_height: 0.155
  stand_front_x_offset: 0.015
  stand_back_x_offset: 0.0
  lie_down_height: 0.083
  lie_down_foot_x_offset: 0.065

servo:
  # WARNING: All servo params calibrated for PDI-HV5523MG (120° / 900-2100µs).
  # If using a different servo model, you MUST update servo_max_angle_deg and recalibrate.
  servo_max_angle_deg: 55.0  # PDI-HV5523MG: 120° total (±60° from center), 5° safety margin
  layout:
    # Wiring: LF(1-3) -> RF(4-6) -> LB(7-9) -> RB(10-12), per leg: HIP -> UPPER -> LOWER
    # Calibrated 2026-03-18 with PDI-HV5523MG servos (two-point method)
    LF_1: {num: 1, center: 306, range: 196, direction: 1, center_angle_deg: -6.8}
    LF_2: {num: 2, center: 306, range: 247, direction: 1, center_angle_deg: 57.9}
    LF_3: {num: 3, center: 306, range: 205, direction: 1, center_angle_deg: -49.3}
    RF_1: {num: 4, center: 306, range: 147, direction: 1, center_angle_deg: 7.5}
    RF_2: {num: 5, center: 306, range: 231, direction: 1, center_angle_deg: -54.8}
    RF_3: {num: 6, center: 306, range: 208, direction: 1, center_angle_deg: 121.8}
    LB_1: {num: 7, center: 306, range: 122, direction: 1, center_angle_deg: -18.0}
    LB_2: {num: 8, center: 306, range: 240, direction: 1, center_angle_deg: 56.9}
    LB_3: {num: 9, center: 306, range: 233, direction: 1, center_angle_deg: -59.4}
    RB_1: {num: 10, center: 306, range: 203, direction: 1, center_angle_deg: -1.6}
    RB_2: {num: 11, center: 306, range: 233, direction: 1, center_angle_deg: -56.5}
    RB_3: {num: 12, center: 306, range: 236, direction: 1, center_angle_deg: 111.9}

control:
  dt: 0.02
  max_fwd_velocity: 0.4
  max_side_velocity: 0.4
  max_yaw_rate: 0.35

gait:
  z_clearance: 0.045
  alpha: 0.5
  beta: 0.5
  num_phases: 8
  rb_contact_phases: [1, 0, 1, 1, 1, 1, 1, 1]
  rf_contact_phases: [1, 1, 1, 0, 1, 1, 1, 1]
  lf_contact_phases: [1, 1, 1, 1, 1, 1, 1, 0]
  lb_contact_phases: [1, 1, 1, 1, 1, 0, 1, 1]
  overlap_time: 0.0
  swing_time: 0.20
  foot_height_time_constant: 0.02
  body_shift_phases: [1, 2, 3, 4, 5, 6, 7, 8]
  fwd_body_balance_shift: 0.025
  back_body_balance_shift: 0.005
  side_body_balance_shift: 0.015

teleop:
  speed_increment: 0.02
  lateral_increment: 0.02
  yaw_rate_increment_deg: 2.0
  angle_increment_deg: 2.5
  height_increment: 0.01
  roll_increment_deg: 2.0
  pitch_increment_deg: 2.0

hardware:
  backend: mock
  i2c_bus: 1
  i2c_address: 64
  pwm_frequency: 50
