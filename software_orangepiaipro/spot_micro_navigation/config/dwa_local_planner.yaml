DWAPlannerROS:
  max_vel_x: 0.12
  min_vel_x: 0.00
  max_vel_y: 0.00
  min_vel_y: 0.00

  max_rot_vel: 0.20
  min_rot_vel: 0.05
  min_in_place_vel_theta: 0.08

  acc_lim_x: 0.20
  acc_lim_y: 0.00
  acc_lim_theta: 0.35

  xy_goal_tolerance: 0.18
  yaw_goal_tolerance: 0.20
  latch_xy_goal_tolerance: false

  sim_time: 1.2
  sim_granularity: 0.05
  angular_sim_granularity: 0.05
  vx_samples: 8
  vy_samples: 1
  vth_samples: 20
  controller_frequency: 12.0

  path_distance_bias: 32.0
  goal_distance_bias: 18.0
  occdist_scale: 0.02
  forward_point_distance: 0.20
  stop_time_buffer: 0.20
  scaling_speed: 0.10
  max_scaling_factor: 0.10
  oscillation_reset_dist: 0.15
